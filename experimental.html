<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Flower Bouquet WebAR Experimental</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <style>
      :root {
        --app-width: 100vw;
        --app-height: 100dvh;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        overscroll-behavior: none;
      }

      body {
        position: fixed;
        inset: 0;
        width: var(--app-width);
        height: var(--app-height);
      }

      #status {
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        left: calc(env(safe-area-inset-left, 0px) + 12px);
        right: calc(env(safe-area-inset-right, 0px) + 12px);
      }

      #confetti-canvas {
        position: fixed;
        inset: 0;
        z-index: 15;
        pointer-events: none;
      }

      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: var(--app-width) !important;
        height: var(--app-height) !important;
      }
    </style>
  </head>
  <body>
    <div
      id="status"
      style="
        position: fixed;
        z-index: 20;
        max-width: 420px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 251, 252, 0.94);
        color: #45222c;
        font: 14px/1.45 'Segoe UI', 'Yu Gothic UI', sans-serif;
      "
    >
      Waiting for AR.js camera...
    </div>
    <canvas id="confetti-canvas"></canvas>

    <a-scene
      vr-mode-ui="enabled: false;"
      embedded
      renderer="alpha: true; logarithmicDepthBuffer: true; precision: medium;"
      arjs="trackingMethod: best; sourceType: webcam; facingMode: environment; sourceWidth: 1280; sourceHeight: 960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false; patternRatio: 0.8;"
    >
      <a-assets timeout="15000">
        <canvas id="frame-layer-canvas" width="1024" height="1024"></canvas>
        <canvas id="bouquet-layer-canvas" width="1024" height="1024"></canvas>
        <canvas id="message-layer-canvas" width="1024" height="512"></canvas>
      </a-assets>

      <a-marker
        id="marker"
        type="pattern"
        url="./marker.patt"
        emitevents="true"
        smooth="true"
        smoothCount="5"
        smoothTolerance="0.01"
        smoothThreshold="2"
      >
        <a-plane
          color="#fff7f8"
          width="1.42"
          height="1.42"
          position="0 0.018 0.02"
          rotation="-90 0 0"
          material="shader: flat; side: double; transparent: false"
        ></a-plane>

        <a-plane
          id="frame-layer-plane"
          width="1.42"
          height="1.42"
          position="0 0.022 0.02"
          rotation="-90 0 0"
          material="src: #frame-layer-canvas; shader: flat; side: double; transparent: true; alphaTest: 0.01"
        ></a-plane>

        <a-plane
          id="bouquet-layer-plane"
          width="0.88"
          height="0.88"
          position="0 0.024 -0.19"
          rotation="-90 0 0"
          material="src: #bouquet-layer-canvas; shader: flat; side: double; transparent: true; alphaTest: 0.01"
        ></a-plane>

        <a-plane
          id="message-layer-plane"
          width="1.34"
          height="0.67"
          position="0 0.036 0.32"
          rotation="-90 0 0"
          material="src: #message-layer-canvas; shader: flat; side: double; transparent: true; alphaTest: 0.01"
          animation__hover="property: position; dir: alternate; dur: 1600; easing: easeInOutSine; loop: true; to: 0 0.052 0.32"
          animation__pulse="property: scale; dir: alternate; dur: 1600; easing: easeInOutSine; loop: true; to: 1.04 1.04 1.04"
        ></a-plane>

        <a-box
          id="fallback-box"
          position="0 0.09 0.02"
          rotation="0 45 0"
          color="#4CC3D9"
          depth="0.22"
          height="0.22"
          width="0.22"
          visible="false"
        ></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const statusElement = document.getElementById("status");
      const marker = document.getElementById("marker");
      const fallbackBox = document.getElementById("fallback-box");
      const confettiCanvas = document.getElementById("confetti-canvas");
      const frameLayerCanvas = document.getElementById("frame-layer-canvas");
      const bouquetLayerCanvas = document.getElementById("bouquet-layer-canvas");
      const messageLayerCanvas = document.getElementById("message-layer-canvas");
      const layerPlanes = [
        document.getElementById("frame-layer-plane"),
        document.getElementById("bouquet-layer-plane"),
        document.getElementById("message-layer-plane")
      ];

      const setStatus = (message) => {
        statusElement.textContent = message;
      };

      const getViewportRect = () => {
        const viewport = window.visualViewport;
        if (viewport) {
          return {
            width: Math.round(viewport.width),
            height: Math.round(viewport.height),
            left: Math.round(viewport.offsetLeft),
            top: Math.round(viewport.offsetTop)
          };
        }

        return {
          width: window.innerWidth,
          height: window.innerHeight,
          left: 0,
          top: 0
        };
      };

      const syncRootViewport = () => {
        const viewport = getViewportRect();
        document.documentElement.style.setProperty("--app-width", `${viewport.width}px`);
        document.documentElement.style.setProperty("--app-height", `${viewport.height}px`);
        document.body.style.width = `${viewport.width}px`;
        document.body.style.height = `${viewport.height}px`;
        document.body.style.left = `${viewport.left}px`;
        document.body.style.top = `${viewport.top}px`;
        confettiCanvas.style.left = `${viewport.left}px`;
        confettiCanvas.style.top = `${viewport.top}px`;
        confettiCanvas.style.width = `${viewport.width}px`;
        confettiCanvas.style.height = `${viewport.height}px`;
        confettiCanvas.width = Math.max(1, Math.round(viewport.width * window.devicePixelRatio));
        confettiCanvas.height = Math.max(1, Math.round(viewport.height * window.devicePixelRatio));
        return viewport;
      };

      const fitDrawable = (element, viewport, objectFit, zIndex, backgroundColor) => {
        if (!element) {
          return;
        }

        element.style.position = "fixed";
        element.style.left = `${viewport.left}px`;
        element.style.top = `${viewport.top}px`;
        element.style.width = `${viewport.width}px`;
        element.style.height = `${viewport.height}px`;
        element.style.marginLeft = "0";
        element.style.marginTop = "0";
        element.style.right = "auto";
        element.style.bottom = "auto";
        element.style.transform = "none";
        element.style.objectFit = objectFit;
        element.style.pointerEvents = "none";
        element.style.zIndex = zIndex;
        element.style.backgroundColor = backgroundColor;
      };

      const fitArViewport = () => {
        const viewport = syncRootViewport();
        const video = document.querySelector("video");
        const sceneCanvas =
          document.querySelector("canvas.a-canvas") ||
          document.querySelector("canvas[data-aframe-canvas]");
        fitDrawable(video, viewport, "contain", "-2", "#000");
        fitDrawable(sceneCanvas, viewport, "contain", "-1", "transparent");
      };

      const refreshLayerTexture = (plane) => {
        const materialComponent = plane.components.material;
        if (!materialComponent || !materialComponent.material || !materialComponent.material.map) {
          return;
        }

        materialComponent.material.map.needsUpdate = true;
      };

      const drawSvgToCanvas = (url, canvas) =>
        new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            const context = canvas.getContext("2d");
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(image, 0, 0, canvas.width, canvas.height);
            resolve();
          };
          image.onerror = reject;
          image.src = url;
        });

      const drawLayers = async () => {
        try {
          await Promise.all([
            drawSvgToCanvas("./experimental-frame.svg", frameLayerCanvas),
            drawSvgToCanvas("./experimental-bouquet.svg", bouquetLayerCanvas),
            drawSvgToCanvas("./experimental-message.svg", messageLayerCanvas)
          ]);

          layerPlanes.forEach(refreshLayerTexture);
        } catch (error) {
          fallbackBox.setAttribute("visible", "true");
          setStatus("Some layered assets failed to load, showing a fallback box instead.");
        }
      };

      const confettiContext = confettiCanvas.getContext("2d");
      let confettiPieces = [];
      let confettiAnimationFrame = null;
      let lastBurstAt = 0;

      const spawnConfetti = () => {
        const now = Date.now();
        if (now - lastBurstAt < 1200) {
          return;
        }

        lastBurstAt = now;
        const width = confettiCanvas.width;
        const height = confettiCanvas.height;
        const colors = ["#e85f73", "#f59c7e", "#ffd36f", "#f6a7c1", "#76b56f"];

        confettiPieces = Array.from({ length: 26 }, () => ({
          x: width * (0.15 + Math.random() * 0.7),
          y: height * (0.04 + Math.random() * 0.08),
          vx: (-0.8 + Math.random() * 1.6) * window.devicePixelRatio,
          vy: (1.8 + Math.random() * 2.6) * window.devicePixelRatio,
          rotation: Math.random() * Math.PI * 2,
          spin: (-0.25 + Math.random() * 0.5),
          size: (7 + Math.random() * 8) * window.devicePixelRatio,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 54 + Math.random() * 18
        }));

        if (!confettiAnimationFrame) {
          animateConfetti();
        }
      };

      const animateConfetti = () => {
        confettiContext.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        confettiPieces = confettiPieces.filter((piece) => piece.life > 0);

        confettiPieces.forEach((piece) => {
          piece.x += piece.vx;
          piece.y += piece.vy;
          piece.vy += 0.05 * window.devicePixelRatio;
          piece.rotation += piece.spin;
          piece.life -= 1;

          confettiContext.save();
          confettiContext.translate(piece.x, piece.y);
          confettiContext.rotate(piece.rotation);
          confettiContext.fillStyle = piece.color;
          confettiContext.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.62);
          confettiContext.restore();
        });

        if (confettiPieces.length) {
          confettiAnimationFrame = window.requestAnimationFrame(animateConfetti);
        } else {
          confettiContext.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
          confettiAnimationFrame = null;
        }
      };

      let videoReadyMessageShown = false;
      const probeVideo = () => {
        const video = document.querySelector("video");
        if (!video) {
          return;
        }

        fitArViewport();

        if (!videoReadyMessageShown && video.readyState >= 2) {
          videoReadyMessageShown = true;
          setStatus("Experimental view is live. Point it at pattern-marker.png.");
        }
      };

      window.addEventListener("load", () => {
        setStatus("Requesting AR.js camera...");
        fitArViewport();
        drawLayers();
      });

      window.addEventListener("resize", fitArViewport);
      window.addEventListener("orientationchange", fitArViewport);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fitArViewport);
        window.visualViewport.addEventListener("scroll", fitArViewport);
      }

      window.setInterval(probeVideo, 800);

      marker.addEventListener("markerFound", () => {
        setStatus("Experimental layered card detected.");
        spawnConfetti();
      });

      marker.addEventListener("markerLost", () => {
        setStatus("Marker lost. Bring pattern-marker.png back into view.");
      });

      window.addEventListener("camera-error", () => {
        setStatus("AR.js camera failed. Reload the page and allow camera access.");
      });
    </script>
  </body>
</html>
