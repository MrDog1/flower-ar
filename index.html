<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flower Bouquet WebAR</title>
    <meta
      name="description"
      content="Marker-based WebAR bouquet built with A-Frame and AR.js."
    >
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <style>
      :root {
        color-scheme: light;
        --panel-bg: rgba(255, 251, 252, 0.88);
        --panel-border: rgba(212, 88, 125, 0.9);
        --text-main: #45222c;
        --text-sub: #885d69;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
        background: #12060c;
        color: var(--text-main);
      }

      body {
        position: relative;
      }

      a-scene {
        position: fixed !important;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        z-index: 1;
      }

      .a-canvas,
      canvas,
      video,
      .arjs-video {
        position: fixed !important;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
      }

      video,
      .arjs-video {
        z-index: 0;
        background: #12060c;
      }

      .hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10;
        padding: 16px;
        pointer-events: none;
      }

      .card {
        max-width: 360px;
        padding: 14px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: var(--panel-bg);
        backdrop-filter: blur(8px);
        box-shadow: 0 12px 32px rgba(125, 52, 74, 0.14);
      }

      .card h1 {
        margin: 0 0 6px;
        font-size: 1rem;
      }

      .card p {
        margin: 0;
        font-size: 0.92rem;
        line-height: 1.45;
        color: var(--text-sub);
      }

      #status {
        margin-top: 10px;
        font-size: 0.86rem;
      }

      .guide {
        position: absolute;
        inset: 50% auto auto 50%;
        width: min(72vw, 360px);
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border: 4px solid rgba(255, 255, 255, 0.94);
        border-radius: 28px;
        box-shadow:
          0 0 0 999px rgba(18, 6, 12, 0.24),
          0 16px 36px rgba(0, 0, 0, 0.22);
      }

      .guide::before,
      .guide::after {
        content: "";
        position: absolute;
        inset: 14px;
        border: 2px dashed rgba(255, 223, 231, 0.9);
        border-radius: 18px;
      }

      .guide-label {
        position: absolute;
        left: 50%;
        bottom: calc(50% - min(36vw, 180px) - 54px);
        transform: translateX(-50%);
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(69, 34, 44, 0.82);
        color: #fff6f8;
        font-size: 0.84rem;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .a-enter-vr-button,
      .a-orientation-modal {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="hud">
      <div class="card">
        <h1>Flower Bouquet WebAR</h1>
        <p>Allow camera access, then point at <code>marker.png</code>.</p>
        <p id="status">Loading AR scene...</p>
      </div>
      <div class="guide" aria-hidden="true"></div>
      <div class="guide-label" aria-hidden="true">Place the marker inside this frame</div>
    </div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="colorManagement: true; alpha: true; antialias: true"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; patternRatio: 0.8;"
    >
      <a-assets timeout="15000">
        <img id="messageCard" src="./message.png" alt="Message card">
        <a-asset-item id="bouquetModel" src="./bouquet.gltf"></a-asset-item>
      </a-assets>

      <a-marker
        id="bouquet-marker"
        type="pattern"
        url="./marker.patt"
        smooth="true"
        smoothCount="8"
        smoothTolerance="0.01"
        smoothThreshold="5"
      >
        <a-image
          src="#messageCard"
          width="1.7"
          height="0.85"
          position="0 1.02 0.18"
          material="alphaTest: 0.01; transparent: true; side: double"
        ></a-image>

        <a-entity
          gltf-model="#bouquetModel"
          position="0 0.42 0"
          scale="0.4 0.4 0.4"
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const statusElement = document.getElementById("status");
      const marker = document.getElementById("bouquet-marker");
      const modelAsset = document.getElementById("bouquetModel");
      const scene = document.querySelector("a-scene");

      const setStatus = (message) => {
        statusElement.textContent = message;
      };

      window.addEventListener("load", () => {
        setStatus("Camera ready. Point at marker.png to reveal the bouquet.");
      });

      marker.addEventListener("markerFound", () => {
        setStatus("Marker detected. Bouquet is anchored to the card.");
      });

      marker.addEventListener("markerLost", () => {
        setStatus("Marker lost. Point the camera back at marker.png.");
      });

      modelAsset.addEventListener("error", () => {
        setStatus("The bouquet model could not be loaded.");
      });

      scene.addEventListener("loaded", () => {
        setStatus("Camera is loading. Allow access if your browser asks.");
      });

      window.addEventListener("camera-error", () => {
        setStatus("Camera access failed. Open this page in Chrome, Edge, or Safari and allow the camera.");
      });
    </script>
  </body>
</html>
