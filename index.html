<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Flower Bouquet WebAR</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      }

      a-scene {
        position: fixed !important;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      .panel {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        max-width: 360px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 251, 252, 0.9);
        color: #45222c;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
      }

      .panel h1 {
        margin: 0 0 6px;
        font-size: 1rem;
      }

      .panel p {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      #status {
        margin-top: 8px;
        color: #7f5963;
      }

      .guide {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(72vw, 320px);
        height: min(72vw, 320px);
        transform: translate(-50%, -50%);
        border: 4px solid rgba(255, 255, 255, 0.92);
        border-radius: 24px;
        box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.18);
      }

      .guide-label {
        position: absolute;
        left: 50%;
        bottom: calc(50% - min(36vw, 160px) - 52px);
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.66);
        color: #fff;
        font-size: 0.82rem;
        white-space: nowrap;
      }

      .a-enter-vr-button,
      .a-orientation-modal {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="panel">
        <h1>Flower Bouquet WebAR</h1>
        <p>Place <code>marker.png</code> inside the center frame.</p>
        <p id="status">Waiting for camera permission...</p>
      </div>
      <div class="guide" aria-hidden="true"></div>
      <div class="guide-label" aria-hidden="true">Align marker.png here</div>
    </div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      arjs="sourceType: webcam; patternRatio: 0.8; debugUIEnabled: false;"
    >
      <a-assets timeout="15000">
        <img id="message-card" src="./message.png" alt="Message card">
        <a-asset-item id="bouquet-model" src="./bouquet.gltf"></a-asset-item>
      </a-assets>

      <a-marker
        id="marker"
        type="pattern"
        url="./marker.patt"
        emitevents="true"
        smooth="true"
        smoothCount="5"
        smoothTolerance="0.01"
        smoothThreshold="2"
      >
        <a-image
          src="#message-card"
          width="1.7"
          height="0.85"
          position="0 1.05 0"
          material="transparent: true; alphaTest: 0.01"
        ></a-image>

        <a-entity
          id="bouquet"
          gltf-model="#bouquet-model"
          position="0 0.25 0"
          scale="0.42 0.42 0.42"
        ></a-entity>

        <a-box
          id="fallback-box"
          position="0 0.15 0"
          rotation="0 45 0"
          color="#4CC3D9"
          depth="0.2"
          height="0.2"
          width="0.2"
          visible="false"
        ></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const statusElement = document.getElementById("status");
      const marker = document.getElementById("marker");
      const modelAsset = document.getElementById("bouquet-model");
      const fallbackBox = document.getElementById("fallback-box");

      const setStatus = (message) => {
        statusElement.textContent = message;
      };

      window.addEventListener("load", () => {
        setStatus("When the camera appears, point it at marker.png.");
      });

      marker.addEventListener("markerFound", () => {
        setStatus("Marker detected.");
      });

      marker.addEventListener("markerLost", () => {
        setStatus("Marker lost. Move marker.png back into the center frame.");
      });

      modelAsset.addEventListener("error", () => {
        fallbackBox.setAttribute("visible", "true");
        setStatus("Bouquet model failed to load, showing a debug box instead.");
      });

      window.addEventListener("camera-error", () => {
        setStatus("Camera failed. Open in Chrome, Edge, or Safari and allow camera access.");
      });
    </script>
  </body>
</html>
