<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Flower Bouquet WebAR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden; background: #000;">
    <div
      id="status"
      style="
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 20;
        max-width: 420px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 251, 252, 0.92);
        color: #45222c;
        font: 14px/1.45 'Segoe UI', 'Yu Gothic UI', sans-serif;
      "
    >
      Waiting for AR.js camera...
    </div>

    <a-scene
      vr-mode-ui="enabled: false;"
      embedded
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; patternRatio: 0.8;"
    >
      <a-assets timeout="15000">
        <img id="message-card" src="./message.png" alt="Message card">
        <a-asset-item id="bouquet-model" src="./bouquet.gltf"></a-asset-item>
      </a-assets>

      <a-marker
        id="marker"
        type="pattern"
        url="./marker.patt"
        emitevents="true"
        smooth="true"
        smoothCount="5"
        smoothTolerance="0.01"
        smoothThreshold="2"
      >
        <a-image
          src="#message-card"
          width="1.7"
          height="0.85"
          position="0 1.05 0"
          material="transparent: true; alphaTest: 0.01"
        ></a-image>

        <a-entity
          id="bouquet"
          gltf-model="#bouquet-model"
          position="0 0.25 0"
          scale="0.42 0.42 0.42"
        ></a-entity>

        <a-box
          id="fallback-box"
          position="0 0.15 0"
          rotation="0 45 0"
          color="#4CC3D9"
          depth="0.2"
          height="0.2"
          width="0.2"
          visible="false"
        ></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const statusElement = document.getElementById("status");
      const marker = document.getElementById("marker");
      const modelAsset = document.getElementById("bouquet-model");
      const fallbackBox = document.getElementById("fallback-box");

      const setStatus = (message) => {
        statusElement.textContent = message;
      };

      let videoReadyMessageShown = false;
      const probeVideo = () => {
        const video = document.querySelector("video");
        if (!video) {
          return;
        }

        if (!videoReadyMessageShown && video.readyState >= 2) {
          videoReadyMessageShown = true;
          setStatus(
            "AR.js camera is live. Point it at marker.png. If nothing appears, move the marker closer and keep it flat."
          );
        }
      };

      window.addEventListener("load", () => {
        setStatus("Requesting AR.js camera...");
      });

      window.setInterval(probeVideo, 800);

      marker.addEventListener("markerFound", () => {
        setStatus("Marker detected.");
      });

      marker.addEventListener("markerLost", () => {
        setStatus("Marker lost. Bring marker.png back into view.");
      });

      modelAsset.addEventListener("error", () => {
        fallbackBox.setAttribute("visible", "true");
        setStatus("Bouquet model failed to load, showing a debug box instead.");
      });

      window.addEventListener("camera-error", () => {
        setStatus("AR.js camera failed. Reload the page and allow camera access.");
      });
    </script>
  </body>
</html>
