<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Flower Bouquet WebAR Mobile</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <style>
      :root {
        --app-width: 100vw;
        --app-height: 100dvh;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        overscroll-behavior: none;
      }

      body {
        position: fixed;
        inset: 0;
        width: var(--app-width);
        height: var(--app-height);
      }

      #status {
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        left: calc(env(safe-area-inset-left, 0px) + 12px);
        right: calc(env(safe-area-inset-right, 0px) + 12px);
      }

      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: var(--app-width) !important;
        height: var(--app-height) !important;
      }
    </style>
  </head>
  <body>
    <div
      id="status"
      style="
        position: fixed;
        z-index: 20;
        max-width: 420px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 251, 252, 0.92);
        color: #45222c;
        font: 14px/1.45 'Segoe UI', 'Yu Gothic UI', sans-serif;
      "
    >
      Waiting for AR.js camera...
    </div>

    <a-scene
      vr-mode-ui="enabled: false;"
      embedded
      renderer="alpha: true; logarithmicDepthBuffer: true; precision: medium;"
      arjs="trackingMethod: best; sourceType: webcam; facingMode: environment; sourceWidth: 1280; sourceHeight: 960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;"
    >
      <a-assets timeout="15000">
        <img id="message-card" src="./message.png" alt="Message card">
      </a-assets>

      <a-marker
        id="marker"
        preset="hiro"
        emitevents="true"
        smooth="true"
        smoothCount="5"
        smoothTolerance="0.01"
        smoothThreshold="2"
      >
        <a-plane
          color="#fff5f7"
          width="1.55"
          height="0.92"
          position="0 0.02 0.28"
          rotation="-90 0 0"
          material="transparent: true; opacity: 0.55; side: double"
        ></a-plane>

        <a-image
          src="#message-card"
          width="1.1"
          height="0.56"
          position="0 0.03 0.24"
          rotation="-90 0 0"
          material="transparent: true; alphaTest: 0.01; side: double"
        ></a-image>

        <a-entity
          id="bouquet"
          position="0 0.045 -0.14"
          rotation="-90 0 0"
          scale="0.9 0.9 0.9"
        >
          <a-triangle
            vertex-a="-0.42 -0.18 0"
            vertex-b="0 -0.62 0"
            vertex-c="0.02 0.08 0"
            material="shader: flat; color: #f7ddd7; side: double"
          ></a-triangle>
          <a-triangle
            vertex-a="0.42 -0.18 0"
            vertex-b="0 -0.62 0"
            vertex-c="-0.02 0.08 0"
            material="shader: flat; color: #faeed2; side: double"
          ></a-triangle>
          <a-plane
            width="0.14"
            height="0.46"
            position="-0.1 -0.2 0.01"
            material="shader: flat; color: #5f9d54; side: double"
          ></a-plane>
          <a-plane
            width="0.14"
            height="0.52"
            position="0 -0.18 0.01"
            material="shader: flat; color: #588d4e; side: double"
          ></a-plane>
          <a-plane
            width="0.14"
            height="0.46"
            position="0.1 -0.2 0.01"
            material="shader: flat; color: #5f9d54; side: double"
          ></a-plane>
          <a-circle
            radius="0.16"
            position="-0.2 0.14 0.03"
            material="shader: flat; color: #f38cab; side: double"
          ></a-circle>
          <a-circle
            radius="0.055"
            position="-0.2 0.14 0.04"
            material="shader: flat; color: #ffe182; side: double"
          ></a-circle>
          <a-circle
            radius="0.19"
            position="0 0.24 0.03"
            material="shader: flat; color: #e85f73; side: double"
          ></a-circle>
          <a-circle
            radius="0.06"
            position="0 0.24 0.04"
            material="shader: flat; color: #ffe182; side: double"
          ></a-circle>
          <a-circle
            radius="0.16"
            position="0.2 0.14 0.03"
            material="shader: flat; color: #f59c7e; side: double"
          ></a-circle>
          <a-circle
            radius="0.055"
            position="0.2 0.14 0.04"
            material="shader: flat; color: #fff0a8; side: double"
          ></a-circle>
          <a-circle
            radius="0.11"
            position="-0.28 0.02 0.025"
            material="shader: flat; color: #ffd36f; side: double"
          ></a-circle>
          <a-circle
            radius="0.04"
            position="-0.28 0.02 0.035"
            material="shader: flat; color: #fff3b7; side: double"
          ></a-circle>
          <a-circle
            radius="0.095"
            position="0.12 -0.01 0.025"
            material="shader: flat; color: #f6a7c1; side: double"
          ></a-circle>
          <a-circle
            radius="0.032"
            position="0.12 -0.01 0.035"
            material="shader: flat; color: #fff0a8; side: double"
          ></a-circle>
          <a-plane
            width="0.12"
            height="0.28"
            position="0 -0.46 0.03"
            material="shader: flat; color: #d85f86; side: double"
          ></a-plane>
        </a-entity>

        <a-box
          id="fallback-box"
          position="0 0.08 -0.14"
          rotation="0 45 0"
          color="#4CC3D9"
          depth="0.22"
          height="0.22"
          width="0.22"
          visible="false"
        ></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const statusElement = document.getElementById("status");
      const marker = document.getElementById("marker");
      const fallbackBox = document.getElementById("fallback-box");

      const setStatus = (message) => {
        statusElement.textContent = message;
      };

      const getViewportRect = () => {
        const viewport = window.visualViewport;
        if (viewport) {
          return {
            width: Math.round(viewport.width),
            height: Math.round(viewport.height),
            left: Math.round(viewport.offsetLeft),
            top: Math.round(viewport.offsetTop)
          };
        }

        return {
          width: window.innerWidth,
          height: window.innerHeight,
          left: 0,
          top: 0
        };
      };

      const syncRootViewport = () => {
        const viewport = getViewportRect();
        document.documentElement.style.setProperty("--app-width", `${viewport.width}px`);
        document.documentElement.style.setProperty("--app-height", `${viewport.height}px`);
        document.body.style.width = `${viewport.width}px`;
        document.body.style.height = `${viewport.height}px`;
        document.body.style.left = `${viewport.left}px`;
        document.body.style.top = `${viewport.top}px`;
        return viewport;
      };

      const fitDrawable = (element, viewport, objectFit, zIndex, backgroundColor) => {
        if (!element) {
          return;
        }

        element.style.position = "fixed";
        element.style.left = `${viewport.left}px`;
        element.style.top = `${viewport.top}px`;
        element.style.width = `${viewport.width}px`;
        element.style.height = `${viewport.height}px`;
        element.style.marginLeft = "0";
        element.style.marginTop = "0";
        element.style.right = "auto";
        element.style.bottom = "auto";
        element.style.transform = "none";
        element.style.objectFit = objectFit;
        element.style.pointerEvents = "none";
        element.style.zIndex = zIndex;
        element.style.backgroundColor = backgroundColor;
      };

      const fitArViewport = () => {
        const viewport = syncRootViewport();
        const video = document.querySelector("video");
        const sceneCanvas =
          document.querySelector("canvas.a-canvas") ||
          document.querySelector("canvas[data-aframe-canvas]");
        fitDrawable(video, viewport, "contain", "-2", "#000");
        fitDrawable(sceneCanvas, viewport, "contain", "-1", "transparent");
      };

      let videoReadyMessageShown = false;
      const probeVideo = () => {
        const video = document.querySelector("video");
        if (!video) {
          return;
        }

        fitArViewport();

        if (!videoReadyMessageShown && video.readyState >= 2) {
          videoReadyMessageShown = true;
          setStatus(
            "AR.js camera is live. Point it at hiro.png."
          );
        }
      };

      window.addEventListener("load", () => {
        setStatus("Requesting AR.js camera...");
        fitArViewport();
      });

      window.addEventListener("resize", fitArViewport);
      window.addEventListener("orientationchange", fitArViewport);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fitArViewport);
        window.visualViewport.addEventListener("scroll", fitArViewport);
      }

      window.setInterval(probeVideo, 800);

      marker.addEventListener("markerFound", () => {
        setStatus("Hiro marker detected. Bouquet and message should appear above the marker.");
      });

      marker.addEventListener("markerLost", () => {
        setStatus("Marker lost. Bring hiro.png back into view.");
      });

      window.addEventListener("camera-error", () => {
        setStatus("AR.js camera failed. Reload the page and allow camera access.");
      });
    </script>
  </body>
</html>
