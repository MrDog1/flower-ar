<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Flower Bouquet WebAR Mobile</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden; background: #000;">
    <div
      id="status"
      style="
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 20;
        max-width: 420px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 251, 252, 0.92);
        color: #45222c;
        font: 14px/1.45 'Segoe UI', 'Yu Gothic UI', sans-serif;
      "
    >
      Waiting for AR.js camera...
    </div>

    <a-scene
      vr-mode-ui="enabled: false;"
      embedded
      renderer="alpha: true; logarithmicDepthBuffer: true; precision: medium;"
      arjs="trackingMethod: best; sourceType: webcam; facingMode: environment; sourceWidth: 1280; sourceHeight: 960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;"
    >
      <a-assets timeout="15000">
        <img id="message-card" src="./message.png" alt="Message card">
        <a-asset-item id="bouquet-model" src="./bouquet.gltf"></a-asset-item>
      </a-assets>

      <a-marker
        id="marker"
        preset="hiro"
        emitevents="true"
        smooth="true"
        smoothCount="5"
        smoothTolerance="0.01"
        smoothThreshold="2"
      >
        <a-image
          src="#message-card"
          width="1.35"
          height="0.68"
          position="0 0.55 0.08"
          rotation="-55 0 0"
          material="transparent: true; alphaTest: 0.01"
        ></a-image>

        <a-entity
          id="bouquet"
          gltf-model="#bouquet-model"
          position="0 0.2 -0.05"
          rotation="-65 0 0"
          scale="0.58 0.58 0.58"
        ></a-entity>

        <a-box
          id="fallback-box"
          position="0 0.15 0"
          rotation="0 45 0"
          color="#4CC3D9"
          depth="0.2"
          height="0.2"
          width="0.2"
          visible="false"
        ></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const statusElement = document.getElementById("status");
      const marker = document.getElementById("marker");
      const modelAsset = document.getElementById("bouquet-model");
      const fallbackBox = document.getElementById("fallback-box");

      const setStatus = (message) => {
        statusElement.textContent = message;
      };

      const fitArViewport = () => {
        const video = document.querySelector("video");
        const sceneCanvas =
          document.querySelector("canvas.a-canvas") ||
          document.querySelector("canvas[data-aframe-canvas]");
        const drawables = [video, sceneCanvas].filter(Boolean);
        if (!drawables.length) {
          return;
        }

        const sourceAspect =
          video && video.videoWidth && video.videoHeight
            ? video.videoWidth / video.videoHeight
            : 4 / 3;
        const viewportAspect = window.innerWidth / window.innerHeight;

        let targetWidth;
        let targetHeight;

        if (sourceAspect > viewportAspect) {
          targetHeight = window.innerHeight;
          targetWidth = targetHeight * sourceAspect;
        } else {
          targetWidth = window.innerWidth;
          targetHeight = targetWidth / sourceAspect;
        }

        const left = (window.innerWidth - targetWidth) / 2;
        const top = (window.innerHeight - targetHeight) / 2;

        drawables.forEach((element) => {
          element.style.position = "fixed";
          element.style.left = `${left}px`;
          element.style.top = `${top}px`;
          element.style.width = `${targetWidth}px`;
          element.style.height = `${targetHeight}px`;
          element.style.marginLeft = "0";
          element.style.marginTop = "0";
          element.style.objectFit = "cover";
        });
      };

      let videoReadyMessageShown = false;
      const probeVideo = () => {
        const video = document.querySelector("video");
        if (!video) {
          return;
        }

        fitArViewport();

        if (!videoReadyMessageShown && video.readyState >= 2) {
          videoReadyMessageShown = true;
          setStatus(
            "AR.js camera is live. Point it at hiro.png."
          );
        }
      };

      window.addEventListener("load", () => {
        setStatus("Requesting AR.js camera...");
        fitArViewport();
      });

      window.addEventListener("resize", fitArViewport);
      window.addEventListener("orientationchange", fitArViewport);

      window.setInterval(probeVideo, 800);

      marker.addEventListener("markerFound", () => {
        setStatus("Hiro marker detected. Bouquet and message should appear above the marker.");
      });

      marker.addEventListener("markerLost", () => {
        setStatus("Marker lost. Bring hiro.png back into view.");
      });

      modelAsset.addEventListener("error", () => {
        fallbackBox.setAttribute("visible", "true");
        setStatus("Bouquet model failed to load, showing a debug box instead.");
      });

      window.addEventListener("camera-error", () => {
        setStatus("AR.js camera failed. Reload the page and allow camera access.");
      });
    </script>
  </body>
</html>
