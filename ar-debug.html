<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>AR Debug</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden; background: #000;">
    <div
      id="status"
      style="
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 20;
        max-width: 460px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 251, 252, 0.92);
        color: #45222c;
        font: 14px/1.45 'Segoe UI', sans-serif;
      "
    >
      Waiting for AR.js camera...
    </div>

    <a-scene
      vr-mode-ui="enabled: false;"
      embedded
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      arjs="trackingMethod: best; sourceType: webcam; facingMode: environment; sourceWidth: 1280; sourceHeight: 960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: true;"
    >
      <a-marker id="hiro-marker" preset="hiro" emitevents="true">
        <a-box position="0 0.5 0" rotation="0 45 0" color="#4CC3D9"></a-box>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const statusElement = document.getElementById("status");
      const marker = document.getElementById("hiro-marker");

      const setStatus = (message) => {
        statusElement.textContent = message;
      };

      const fitArViewport = () => {
        const video = document.querySelector("video");
        const drawables = [video, ...document.querySelectorAll("canvas")].filter(Boolean);
        if (!drawables.length) {
          return;
        }

        const sourceAspect =
          video && video.videoWidth && video.videoHeight
            ? video.videoWidth / video.videoHeight
            : 4 / 3;
        const viewportAspect = window.innerWidth / window.innerHeight;

        let targetWidth;
        let targetHeight;

        if (sourceAspect > viewportAspect) {
          targetWidth = window.innerWidth;
          targetHeight = targetWidth / sourceAspect;
        } else {
          targetHeight = window.innerHeight;
          targetWidth = targetHeight * sourceAspect;
        }

        const left = (window.innerWidth - targetWidth) / 2;
        const top = (window.innerHeight - targetHeight) / 2;

        drawables.forEach((element) => {
          element.style.position = "fixed";
          element.style.left = `${left}px`;
          element.style.top = `${top}px`;
          element.style.width = `${targetWidth}px`;
          element.style.height = `${targetHeight}px`;
          element.style.marginLeft = "0";
          element.style.marginTop = "0";
          element.style.objectFit = "contain";
          element.style.backgroundColor = "#000";
        });
      };

      let zoomAdjusted = false;
      const trySetMinimumZoom = () => {
        if (zoomAdjusted) {
          return;
        }

        const video = document.querySelector("video");
        const stream = video && video.srcObject;
        const track =
          stream && stream.getVideoTracks && stream.getVideoTracks().length
            ? stream.getVideoTracks()[0]
            : null;

        if (!track || !track.getCapabilities || !track.applyConstraints) {
          zoomAdjusted = true;
          return;
        }

        const capabilities = track.getCapabilities();
        if (!capabilities.zoom || typeof capabilities.zoom.min !== "number") {
          zoomAdjusted = true;
          return;
        }

        zoomAdjusted = true;
        track
          .applyConstraints({
            advanced: [
              {
                zoom: capabilities.zoom.min
              }
            ]
          })
          .then(() => {
            setStatus(
              "Camera switched to the widest available view. Test with /flower-ar/hiro.png."
            );
            fitArViewport();
          })
          .catch(() => {
            setStatus(
              "Using the default camera view. If framing is still tight, rotate the phone sideways."
            );
          });
      };

      let videoReported = false;
      window.setInterval(() => {
        const video = document.querySelector("video");
        if (!video) {
          return;
        }

        fitArViewport();
        trySetMinimumZoom();

        if (!videoReported && video.readyState >= 2) {
          videoReported = true;
          setStatus(
            "AR.js camera is live. Test with the Hiro marker at /flower-ar/hiro.png. The full camera frame should stay visible."
          );
        }
      }, 800);

      window.addEventListener("load", fitArViewport);
      window.addEventListener("resize", fitArViewport);
      window.addEventListener("orientationchange", fitArViewport);

      marker.addEventListener("markerFound", () => {
        setStatus("Hiro marker detected. AR.js marker tracking works.");
      });

      marker.addEventListener("markerLost", () => {
        setStatus("Hiro marker lost. Move the Hiro marker back into view.");
      });

      window.addEventListener("camera-error", () => {
        setStatus("AR.js camera failed. Reload and allow camera access.");
      });
    </script>
  </body>
</html>
